extends:
  - recommended

apis:
  bapi@v0.1:
    root: ./bapi.yaml
  fapi@v0.1:
    root: ./fapi.yaml

rules:
  operation-operationId: error
  operation-operationId-unique: error
  operation-operationId-url-safe: error
  operation-summary: error
  operation-description: error
  operation-tag-defined: error
  operation-2xx-response: error
  operation-4xx-response: warn
  no-unresolved-refs: error
  no-undefined-server-variable: error
  no-invalid-media-type-examples: warn
  no-empty-servers: error
  spec-strict-refs: error
  # Each root spec only registers the components its paths reference; the
  # shared `components/` dir contains a few that one surface uses but the
  # other doesn't (e.g. SignIn / SignUp are FAPI-only). Don't shout about
  # that — `no-unused-components` is intentionally off.
  no-unused-components: off
  tag-description: error
  security-defined: error
  no-identical-paths: error
