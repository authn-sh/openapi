    Error:                                     { $ref: ./components/schemas/Error.yaml }
    ErrorResponse:                             { $ref: ./components/schemas/ErrorResponse.yaml }
    EmailAddress:                              { $ref: ./components/schemas/EmailAddress.yaml }
    PhoneNumber:                               { $ref: ./components/schemas/PhoneNumber.yaml }
    User:                                      { $ref: ./components/schemas/User.yaml }
    Client:                                    { $ref: ./components/schemas/Client.yaml }
    ClientResponseEnvelope:                    { $ref: ./components/schemas/ClientResponseEnvelope.yaml }
    Environment:                               { $ref: ./components/schemas/Environment.yaml }
    Session:                                   { $ref: ./components/schemas/Session.yaml }
    SessionActivity:                           { $ref: ./components/schemas/SessionActivity.yaml }
    SignIn:                                    { $ref: ./components/schemas/SignIn.yaml }
    SignUp:                                    { $ref: ./components/schemas/SignUp.yaml }
    Challenge:                                 { $ref: ./components/schemas/Challenge.yaml }
    ChallengeCreateRequest:                    { $ref: ./components/schemas/ChallengeCreateRequest.yaml }
    ChallengeAnswerRequest:                    { $ref: ./components/schemas/ChallengeAnswerRequest.yaml }
    TotpSecret:                                { $ref: ./components/schemas/TotpSecret.yaml }
    BackupCode:                                { $ref: ./components/schemas/BackupCode.yaml }
    BackupCodeBatch:                           { $ref: ./components/schemas/BackupCodeBatch.yaml }
    AttributeSetting:                          { $ref: ./components/schemas/AttributeSetting.yaml }
    PublicUserData:                            { $ref: ./components/schemas/PublicUserData.yaml }
    Organization:                              { $ref: ./components/schemas/Organization.yaml }
    OrganizationMembership:                    { $ref: ./components/schemas/OrganizationMembership.yaml }
    OrganizationInvitation:                    { $ref: ./components/schemas/OrganizationInvitation.yaml }
    OrganizationInvitationCreateRequest:       { $ref: ./components/schemas/OrganizationInvitationCreateRequest.yaml }
