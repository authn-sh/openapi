openapi: 3.1.0

info:
  title: authn.sh FAPI
  version: 0.1.0-pre
  summary: Frontend API (browser-facing) for authn.sh.
  description: |
    The **FAPI** is the browser-facing surface — every operation an
    authn.sh JS SDK or Account Portal page calls from a user's
    browser. It identifies the device via the `__client` cookie set
    on the per-environment FAPI host (`https://{env_slug}.authn.sh/v1`),
    with a `__authn_db_jwt` query-string fallback for cross-origin
    development.

    Cross-origin XHR is enabled for origins listed in the
    environment's allowlist; production cookies are HttpOnly,
    `SameSite=Lax`, and `Secure`.

    The server-to-server admin surface (BAPI) is documented
    separately in [`bapi.yaml`](./bapi.yaml). The two surfaces
    share the `components/` directory but have distinct paths,
    security schemes, and SDK consumers.

    SDKs that consume this surface include `@authn-sh/sdk-js`
    (and transitively `@authn-sh/sdk-react`). They generate
    request/response types from `dist/fapi.bundled.json`.
  license:
    name: AGPL-3.0-only
    identifier: AGPL-3.0-only
  contact:
    name: authn.sh
    url: https://authn.sh
  termsOfService: https://authn.sh/terms

servers:
  - url: https://{env_slug}.authn.sh/v1
    description: Production FAPI (per-environment, browser-facing).
    variables:
      env_slug:
        default: example
        description: |
          The slug of the environment whose FAPI you're addressing. Each
          `Environment` row gets a unique slug at creation; production envs use
          `<project_slug>`, development envs use `<project_slug>-dev`.

tags:
  - name: Environment
    description: Public per-environment configuration consumed at SDK boot.
  - name: Client
    description: Per-device state container.
  - name: Sign-Ins
    description: In-progress sign-in attempts (state machine).
  - name: Sign-Ups
    description: In-progress sign-up attempts (state machine).
  - name: Sessions
    description: Live authenticated sessions on the calling device.
  - name: Me
    description: Authenticated end-user's view of themselves.
  - name: Organizations
    description: Organizations the calling user can interact with.
  - name: Org Memberships
    description: User ↔ organization joins.
  - name: Org Invitations
    description: Pending invitations to join an organization.
  - name: Org Domains
    description: Verified domains attached to an organization.
  - name: Org Membership Requests
    description: Pending join requests created by domain auto-suggestion.
  - name: JWKS / OIDC
    description: Public keys and OIDC discovery served per-environment.

security:
  - client_cookie: []
  - dev_browser_jwt: []

