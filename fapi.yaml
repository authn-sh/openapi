components:
  securitySchemes:
    client_cookie:
      type: apiKey
      in: cookie
      name: __client
      description: |
        FAPI device cookie. HttpOnly, `SameSite=Lax`, `Secure` in production.
        Issued by `GET /v1/client` on first contact. Identifies the `Client`
        row across requests on its FAPI host.

    dev_browser_jwt:
      type: apiKey
      in: query
      name: __authn_db_jwt
      description: |
        Cross-origin development fallback. When the SDK runs against a dev
        FAPI host that can't set a SameSite=Lax cookie cross-site (no HTTPS),
        it sends this query-string JWT instead. Production never uses this.

