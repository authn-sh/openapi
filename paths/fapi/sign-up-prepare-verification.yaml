parameters:
  - name: sign_up_id
    in: path
    required: true
    schema: { $ref: ../../components/schemas/Id.yaml }

post:
  operationId: prepareVerification
  summary: Prepare sign-up verification
  description: |
    Issue a verification challenge for one of the unverified attributes
    on the sign-up.

    Supported strategies:

    - `email_code` (v0.1) — sends a 6-digit code to the email.
    - `email_link` (v0.2) — sends a click-through link instead. The
      caller must follow up with
      `attempt_verification { strategy: "email_link" }` (no payload)
      and poll `getClient` until the matching verification flips
      to `verified` or `transferable`. See the cross-device polling
      note on `SignUp`.
  tags: [Sign-Ups]
  security:
    - client_cookie: []
    - dev_browser_jwt: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required: [strategy]
          additionalProperties: false
          properties:
            strategy:
              type: string
              enum: [email_code, email_link]
            redirect_url:
              type: string
              format: uri
              description: |
                For `email_link`, the URL the magic link bounces back
                to after `clientHandshake` consumes the ticket. Must
                be on the redirect-URL allowlist.
        examples:
          email_code:
            value: { strategy: email_code }
          email_link:
            value:
              strategy: email_link
              redirect_url: https://app.acme.com/welcome
  responses:
    "200":
      description: Sign-up with the new verification populated, wrapped.
      content:
        application/json:
          schema: { $ref: ../../components/schemas/ClientResponseEnvelope.yaml }
    "401": { $ref: ../../components/responses/Unauthorized.yaml }
    "404": { $ref: ../../components/responses/NotFound.yaml }
    "422": { $ref: ../../components/responses/UnprocessableEntity.yaml }
    "429": { $ref: ../../components/responses/TooManyRequests.yaml }
