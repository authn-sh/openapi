parameters:
  - name: email_address_id
    in: path
    required: true
    schema: { $ref: ../../components/schemas/Id.yaml }
  - name: challenge_id
    in: path
    required: true
    schema: { $ref: ../../components/schemas/Id.yaml }

get:
  operationId: getEmailAddressChallenge
  summary: Get a challenge on one of my email addresses
  description: |
    Fetch the focused `Challenge` resource.

    Returns the unwrapped `Challenge` — no envelope, no Client refresh.
  tags: [Me]
  security:
    - client_cookie: []
    - dev_browser_jwt: []
  responses:
    "200":
      description: The current state of the challenge.
      content:
        application/json:
          schema: { $ref: ../../components/schemas/Challenge.yaml }
    "401": { $ref: ../../components/responses/Unauthorized.yaml }
    "404": { $ref: ../../components/responses/NotFound.yaml }
    "429": { $ref: ../../components/responses/TooManyRequests.yaml }
