parameters:
  - name: session_id
    in: path
    required: true
    schema: { $ref: ../../components/schemas/Id.yaml }

post:
  operationId: touchClientSession
  summary: Touch a session
  description: |
    Update `last_active_at` and (optionally) the active
    organization. The SDK calls this on every page view so the
    dashboard "active sessions" view is fresh.

    Passing `active_organization_id` sets
    `Session.last_active_organization_id` and refreshes the
    session JWT so the next `getSessionToken` issues a token whose
    `org` claim points at the new organization. Pass `null` to
    clear. Returns `403 not_a_member` if the current user has no
    membership in the target organization.

    For pure switcher flows that don't need to bump
    `last_active_at` at the same time, prefer
    `setMyActiveOrganization` (`PUT /v1/me/active-organization`).
  tags: [Sessions]
  requestBody:
    required: false
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          properties:
            active_organization_id:
              type: [string, "null"]
              description: |
                Switch the active organization. `null` clears it.
                Setting a new value refreshes the session JWT so
                the next `getSessionToken` carries the matching
                `org` claim.
  responses:
    "200":
      description: The touched session, wrapped.
      content:
        application/json:
          schema: { $ref: ../../components/schemas/ClientResponseEnvelope.yaml }
    "401": { $ref: ../../components/responses/Unauthorized.yaml }
    "403": { $ref: ../../components/responses/Forbidden.yaml }
    "404": { $ref: ../../components/responses/NotFound.yaml }
    "422": { $ref: ../../components/responses/UnprocessableEntity.yaml }
