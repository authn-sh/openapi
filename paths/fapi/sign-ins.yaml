post:
  operationId: createSignIn
  summary: Create a sign-in attempt
  description: |
    Start a sign-in flow. The caller may supply only the identifier (in
    which case the response carries `supported_strategies` so the SDK
    can pick one and create a `Challenge`), or supply an identifier +
    strategy (and password when applicable) to fold the first challenge
    into the create call.

    ### Domain routing to enterprise connections (v0.6)

    When the identifier resolves to an email and the email's domain
    matches at least one verified `OrganizationDomain` whose org has a
    reachable `EnterpriseConnection` (the connection's `domains[]`
    includes the same name), the server applies enterprise-SSO
    routing:

    - **Exactly one matching connection** —
      `SignIn.supported_strategies` narrows to `["enterprise_sso"]`
      and `SignIn.enterprise_connection_id` is populated. The SDK
      issues a `Challenge` with `strategy: "enterprise_sso"` and
      follows `external_verification_redirect_url`.
    - **Multiple matching connections** — all reachable connections
      surface; `supported_strategies` includes `enterprise_sso` plus
      one `saml` entry per `protocol: "saml"` connection so the SDK
      can pick. `SignIn.enterprise_connection_id` stays `null` until
      the SDK picks one (issuing a `Challenge` with
      `strategy: "saml"` and an explicit
      `enterprise_connection_id` body field).
    - **No matching connection** — domain routing is a no-op;
      `supported_strategies` reflects the environment's
      `auth_config` as usual.

    Domain routing is independent of `OrganizationDomain.enrollment_mode`
    — that field gates the post-sign-up membership side-effect, not
    sign-in steering.
  tags: [Sign-Ins]
  security:
    - client_cookie: []
    - dev_browser_jwt: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: false
          properties:
            identifier:
              type: string
              description: Email, phone (E.164), or username.
            strategy:
              type: string
              enum: [password, email_code, reset_password_email_code, ticket]
            password:
              type: string
              minLength: 1
            redirect_url:
              type: string
              format: uri
              description: Used by strategies that need a callback URL.
            ticket:
              type: string
              description: Single-use ticket from an invitation or magic link.
            transfer:
              type: boolean
              default: false
            captcha_token:        { type: string }
            captcha_widget_type:  { type: string, enum: [smart, invisible, managed] }
            captcha_error:        { type: string }
        examples:
          identify_only:
            summary: Identify and let the SDK pick the next factor
            value:
              identifier: jane@acme.com
          password_first_attempt:
            summary: Identify + first-factor password in one call
            value:
              identifier: jane@acme.com
              strategy: password
              password: "correct horse battery staple"
          email_code:
            summary: Identify + start an email code
            value:
              identifier: jane@acme.com
              strategy: email_code
  responses:
    "200":
      description: New (or transitioned) sign-in attempt, wrapped.
      content:
        application/json:
          schema: { $ref: ../../components/schemas/ClientResponseEnvelope.yaml }
    "401": { $ref: ../../components/responses/Unauthorized.yaml }
    "422": { $ref: ../../components/responses/UnprocessableEntity.yaml }
    "429": { $ref: ../../components/responses/TooManyRequests.yaml }
