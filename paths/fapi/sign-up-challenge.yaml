parameters:
  - name: sign_up_id
    in: path
    required: true
    schema: { $ref: ../../components/schemas/Id.yaml }
  - name: challenge_id
    in: path
    required: true
    schema: { $ref: ../../components/schemas/Id.yaml }

get:
  operationId: getSignUpChallenge
  summary: Get a challenge on a sign-up
  description: |
    Fetch the focused `Challenge` resource. Used primarily by the SDK
    to poll an `email_link` challenge from the originating device while
    the user clicks the magic link (possibly on a different device).
    Recommended cadence: every 2s for 60s, then 5s for 5min, then stop.
    Servers may rate-limit polling above this cadence (`429`).

    Unlike `getSignUp`, this endpoint returns the unwrapped `Challenge`
    — no envelope, no Client refresh. Polling is read-only and the SDK
    only needs the focused resource.
  tags: [Sign-Ups]
  security:
    - client_cookie: []
    - dev_browser_jwt: []
  responses:
    "200":
      description: The current state of the challenge.
      content:
        application/json:
          schema: { $ref: ../../components/schemas/Challenge.yaml }
    "401": { $ref: ../../components/responses/Unauthorized.yaml }
    "404": { $ref: ../../components/responses/NotFound.yaml }
    "429": { $ref: ../../components/responses/TooManyRequests.yaml }
