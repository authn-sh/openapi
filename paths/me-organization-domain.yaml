parameters:
  - name: organization_id
    in: path
    required: true
    description: ID of the organization.
    schema: { $ref: ../components/schemas/Id.yaml }
  - name: domain_id
    in: path
    required: true
    description: ID of the domain.
    schema: { $ref: ../components/schemas/Id.yaml }

get:
  operationId: getOrganizationDomainFapi
  summary: Get an organization domain (FAPI)
  description: |
    Fetch a single `OrganizationDomain`.

    **Access**: requires `org:sys_domains:read` in this organization.
  tags: [Org Domains]
  security:
    - client_cookie: []
    - dev_browser_jwt: []
  responses:
    "200":
      description: The domain.
      content:
        application/json:
          schema: { $ref: ../components/schemas/OrganizationDomain.yaml }
    "401": { $ref: ../components/responses/Unauthorized.yaml }
    "403": { $ref: ../components/responses/Forbidden.yaml }
    "404": { $ref: ../components/responses/NotFound.yaml }

patch:
  operationId: updateOrganizationDomainFapi
  summary: Update an organization domain (FAPI)
  description: |
    Edit the enrollment policy.

    **Access**: requires `org:sys_domains:manage` in this organization.
  tags: [Org Domains]
  security:
    - client_cookie: []
    - dev_browser_jwt: []
  requestBody:
    required: true
    content:
      application/json:
        schema: { $ref: ../components/schemas/OrganizationDomainUpdateRequest.yaml }
        examples:
          enrollment:
            value: { enrollment_mode: manual_invitation }
  responses:
    "200":
      description: The updated domain, wrapped.
      content:
        application/json:
          schema: { $ref: ../components/schemas/ClientResponseEnvelope.yaml }
    "401": { $ref: ../components/responses/Unauthorized.yaml }
    "403": { $ref: ../components/responses/Forbidden.yaml }
    "404": { $ref: ../components/responses/NotFound.yaml }
    "422": { $ref: ../components/responses/UnprocessableEntity.yaml }

delete:
  operationId: deleteOrganizationDomainFapi
  summary: Remove a domain from the organization (FAPI)
  description: |
    Delete the domain. Pending invitations and suggestions
    generated by the domain are also cleared.

    **Access**: requires `org:sys_domains:manage` in this organization.
  tags: [Org Domains]
  security:
    - client_cookie: []
    - dev_browser_jwt: []
  responses:
    "200":
      description: The removed domain, wrapped.
      content:
        application/json:
          schema: { $ref: ../components/schemas/ClientResponseEnvelope.yaml }
    "401": { $ref: ../components/responses/Unauthorized.yaml }
    "403": { $ref: ../components/responses/Forbidden.yaml }
    "404": { $ref: ../components/responses/NotFound.yaml }
