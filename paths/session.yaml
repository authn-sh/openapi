parameters:
  - name: session_id
    in: path
    required: true
    schema: { $ref: ../components/schemas/Id.yaml }

get:
  operationId: getSession
  summary: Get a session (BAPI)
  description: Fetch one `Session` by ID, irrespective of which `Client` it belongs to.
  tags: [Sessions]
  responses:
    "200":
      description: The session.
      content:
        application/json:
          schema: { $ref: ../components/schemas/Session.yaml }
    "401": { $ref: ../components/responses/Unauthorized.yaml }
    "404": { $ref: ../components/responses/NotFound.yaml }
