parameters:
  - name: invitation_id
    in: path
    required: true
    description: ID of the invitation.
    schema: { $ref: ../components/schemas/Id.yaml }

post:
  operationId: acceptMyOrganizationInvitation
  summary: Accept an organization invitation
  description: |
    Convert a pending invitation addressed to one of the current
    user's verified email addresses into an
    `OrganizationMembership`. Emits `organizationMembership.created`.

    Returns `404` if the invitation isn't addressed to the current
    user; `422 invitation_not_pending` if it has already been
    accepted, revoked, or expired.
  tags: [Me]
  security:
    - client_cookie: []
    - dev_browser_jwt: []
  responses:
    "200":
      description: The new membership, wrapped.
      content:
        application/json:
          schema: { $ref: ../components/schemas/ClientResponseEnvelope.yaml }
          examples:
            accepted:
              summary: Membership created from invitation
              value:
                response:
                  id: orgmem_01HKX9SY9V7H7TF8C8K7J9X4ZJ
                  object: organization_membership
                  role: "org:member"
                  role_name: Member
                  permissions:
                    - "org:sys_domains:read"
                    - "org:sys_memberships:read"
                    - "org:sys_profile:read"
                  public_metadata: {}
                  private_metadata: {}
                  organization:
                    id: org_01HKX9SY9V7H7TF8C8K7J9X4ZH
                    object: organization
                    name: Acme Inc.
                    slug: acme
                    image_url: null
                    has_image: false
                    members_count: 13
                    pending_invitations_count: 2
                    max_allowed_memberships: null
                    admin_delete_enabled: true
                    public_metadata: {}
                    private_metadata: {}
                    created_by: user_01HKX9SY9V7H7TF8C8K7J9X4ZB
                    created_at: 1714723200000
                    updated_at: 1714896050000
                  public_user_data:
                    first_name: Jane
                    last_name: Doe
                    image_url: null
                    has_image: false
                    identifier: jane@acme.com
                    user_id: user_01HKX9SY9V7H7TF8C8K7J9X4ZB
                  created_at: 1714896050000
                  updated_at: 1714896050000
                client:
                  id: client_01HKX9SY9V7H7TF8C8K7J9X4ZA
                  object: client
                  sessions: []
                  sign_in: null
                  sign_up: null
                  last_active_session_id: sess_01HKX9SY9V7H7TF8C8K7J9X4ZC
                  created_at: 1714895990000
                  updated_at: 1714896050000
    "401": { $ref: ../components/responses/Unauthorized.yaml }
    "404": { $ref: ../components/responses/NotFound.yaml }
