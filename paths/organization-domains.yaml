parameters:
  - name: organization_id
    in: path
    required: true
    description: ID of the organization.
    schema: { $ref: ../components/schemas/Id.yaml }

get:
  operationId: listOrganizationDomains
  summary: List organization domains
  description: Paginated list of `OrganizationDomain` rows for the organization.
  tags: [Org Domains]
  parameters:
    - $ref: ../components/parameters/LimitParam.yaml
    - $ref: ../components/parameters/OffsetParam.yaml
    - $ref: ../components/parameters/OrderByParam.yaml
    - name: verified
      in: query
      required: false
      schema: { type: boolean }
    - name: enrollment_mode
      in: query
      required: false
      schema:
        type: string
        enum: [manual_invitation, automatic_invitation, automatic_suggestion]
  responses:
    "200":
      description: A page of domains.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../components/schemas/PaginatedList.yaml
              - type: object
                properties:
                  data:
                    type: array
                    items: { $ref: ../components/schemas/OrganizationDomain.yaml }
    "401": { $ref: ../components/responses/Unauthorized.yaml }
    "404": { $ref: ../components/responses/NotFound.yaml }

post:
  operationId: createOrganizationDomain
  summary: Add a domain to an organization
  description: |
    Add a new domain. Verification is issued lazily — call
    `POST /v1/organizations/{id}/domains/{domain_id}/verify` to
    kick off the proof flow.
  tags: [Org Domains]
  parameters:
    - $ref: ../components/parameters/IdempotencyKeyHeader.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema: { $ref: ../components/schemas/OrganizationDomainCreateRequest.yaml }
        examples:
          basic:
            summary: Add acme.com with DNS verification
            value:
              name: acme.com
              enrollment_mode: automatic_invitation
              verification_strategy: dns
  responses:
    "201":
      description: The new domain.
      content:
        application/json:
          schema: { $ref: ../components/schemas/OrganizationDomain.yaml }
    "401": { $ref: ../components/responses/Unauthorized.yaml }
    "404": { $ref: ../components/responses/NotFound.yaml }
    "409": { $ref: ../components/responses/Conflict.yaml }
    "422": { $ref: ../components/responses/UnprocessableEntity.yaml }
    "429": { $ref: ../components/responses/TooManyRequests.yaml }
