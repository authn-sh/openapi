parameters:
  - name: organization_id
    in: path
    required: true
    description: ID of the organization.
    schema: { $ref: ../../components/schemas/Id.yaml }

get:
  operationId: listOrganizationMemberships
  summary: List organization memberships
  description: |
    Paginated list of `OrganizationMembership` rows for the
    organization. `public_user_data` is populated inline so list
    views don't need a follow-up `getUser`.
  tags: [Org Memberships]
  parameters:
    - $ref: ../../components/parameters/LimitParam.yaml
    - $ref: ../../components/parameters/OffsetParam.yaml
    - name: order_by
      in: query
      description: |
        Sort key prefixed with `+` (ascending, default) or `-`
        (descending). Allowed: `created_at`, `updated_at`,
        `public_user_data.first_name`, `public_user_data.last_name`.
      required: false
      schema: { type: string }
    - name: role
      in: query
      description: |
        Filter by role `key`. Repeat for OR semantics.
      required: false
      style: form
      explode: true
      schema:
        type: array
        items: { type: string }
    - name: user_id
      in: query
      description: Filter by `User.id`. Repeat for OR semantics.
      required: false
      style: form
      explode: true
      schema:
        type: array
        items: { type: string }
    - name: query
      in: query
      description: |
        Free-text substring match against the member's identifier,
        first name, and last name. Case-insensitive.
      required: false
      schema: { type: string }
  responses:
    "200":
      description: A page of memberships.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/PaginatedList.yaml
              - type: object
                properties:
                  data:
                    type: array
                    items: { $ref: ../../components/schemas/OrganizationMembership.yaml }
          examples:
            admins:
              summary: Filtered to org:admin members
              value:
                data:
                  - id: orgmem_01HKX9SY9V7H7TF8C8K7J9X4ZJ
                    object: organization_membership
                    role: "org:admin"
                    role_name: Admin
                    permissions:
                      - "org:sys_domains:manage"
                      - "org:sys_domains:read"
                      - "org:sys_memberships:manage"
                      - "org:sys_memberships:read"
                      - "org:sys_profile:delete"
                      - "org:sys_profile:manage"
                    public_metadata: {}
                    private_metadata: {}
                    organization:
                      id: org_01HKX9SY9V7H7TF8C8K7J9X4ZH
                      object: organization
                      name: Acme Inc.
                      slug: acme
                      image_url: null
                      has_image: false
                      members_count: 12
                      pending_invitations_count: 3
                      max_allowed_memberships: null
                      admin_delete_enabled: true
                      public_metadata: { plan: pro }
                      private_metadata: {}
                      created_by: user_01HKX9SY9V7H7TF8C8K7J9X4ZB
                      created_at: 1714723200000
                      updated_at: 1714895999000
                    public_user_data:
                      first_name: Jane
                      last_name: Doe
                      image_url: null
                      has_image: false
                      identifier: jane@acme.com
                      user_id: user_01HKX9SY9V7H7TF8C8K7J9X4ZB
                    created_at: 1714723200000
                    updated_at: 1714895999000
                total_count: 1
    "401": { $ref: ../../components/responses/Unauthorized.yaml }
    "404": { $ref: ../../components/responses/NotFound.yaml }
    "422": { $ref: ../../components/responses/UnprocessableEntity.yaml }

post:
  operationId: createOrganizationMembership
  summary: Add a member to an organization
  description: |
    Enroll an existing user as a member with the given role. To
    enroll a user who hasn't signed up yet, create an
    `OrganizationInvitation` instead.
  tags: [Org Memberships]
  parameters:
    - $ref: ../../components/parameters/IdempotencyKeyHeader.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema: { $ref: ../../components/schemas/OrganizationMembershipCreateRequest.yaml }
        examples:
          basic:
            summary: Add an existing user as org:member
            value:
              user_id: user_01HKX9SY9V7H7TF8C8K7J9X4ZB
              role: "org:member"
  responses:
    "201":
      description: The new membership.
      content:
        application/json:
          schema: { $ref: ../../components/schemas/OrganizationMembership.yaml }
    "401": { $ref: ../../components/responses/Unauthorized.yaml }
    "404": { $ref: ../../components/responses/NotFound.yaml }
    "409": { $ref: ../../components/responses/Conflict.yaml }
    "422": { $ref: ../../components/responses/UnprocessableEntity.yaml }
    "429": { $ref: ../../components/responses/TooManyRequests.yaml }
