get:
  operationId: listOrganizations
  summary: List organizations
  description: |
    Return a paginated list of organizations in the environment,
    filterable by member, free-text query, and creation timestamp.
  tags: [Organizations]
  parameters:
    - $ref: ../../components/parameters/LimitParam.yaml
    - $ref: ../../components/parameters/OffsetParam.yaml
    - name: order_by
      in: query
      description: |
        Sort key prefixed with `+` (ascending, default) or `-`
        (descending). Allowed: `created_at`, `updated_at`,
        `members_count`, `name`.
      required: false
      schema:
        type: string
        examples: ["+created_at", "-members_count"]
    - name: query
      in: query
      description: |
        Free-text substring match against `name` and `slug`.
        Case-insensitive.
      required: false
      schema: { type: string }
    - name: user_id
      in: query
      description: |
        Filter to organizations the given user is a member of.
        Repeat for OR semantics.
      required: false
      style: form
      explode: true
      schema:
        type: array
        items: { type: string }
    - name: created_at_after
      in: query
      description: Unix ms; only return orgs created strictly after this instant.
      required: false
      schema: { type: integer, format: int64, minimum: 0 }
    - name: created_at_before
      in: query
      description: Unix ms; only return orgs created strictly before this instant.
      required: false
      schema: { type: integer, format: int64, minimum: 0 }
  responses:
    "200":
      description: A page of organizations.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/PaginatedList.yaml
              - type: object
                properties:
                  data:
                    type: array
                    items: { $ref: ../../components/schemas/Organization.yaml }
          examples:
            page:
              summary: First page, one organization
              value:
                data:
                  - id: org_01HKX9SY9V7H7TF8C8K7J9X4ZH
                    object: organization
                    name: Acme Inc.
                    slug: acme
                    image_url: null
                    has_image: false
                    members_count: 12
                    pending_invitations_count: 3
                    max_allowed_memberships: null
                    admin_delete_enabled: true
                    public_metadata: { plan: pro }
                    private_metadata: {}
                    created_by: user_01HKX9SY9V7H7TF8C8K7J9X4ZB
                    created_at: 1714723200000
                    updated_at: 1714895999000
                total_count: 1
    "401": { $ref: ../../components/responses/Unauthorized.yaml }
    "422": { $ref: ../../components/responses/UnprocessableEntity.yaml }
    "429": { $ref: ../../components/responses/TooManyRequests.yaml }

post:
  operationId: createOrganization
  summary: Create an organization
  description: |
    Create an `Organization`. The BAPI is privileged: pass
    `created_by` to record the creator (not required, but
    recommended for audit). FAPI consumers use the
    `/v1/organizations` FAPI variant which fills `created_by`
    automatically from the calling user.
  tags: [Organizations]
  parameters:
    - $ref: ../../components/parameters/IdempotencyKeyHeader.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema: { $ref: ../../components/schemas/OrganizationCreateRequest.yaml }
        examples:
          basic:
            summary: Create "Acme Inc." with explicit creator
            value:
              name: Acme Inc.
              slug: acme
              created_by: user_01HKX9SY9V7H7TF8C8K7J9X4ZB
              public_metadata: { plan: pro }
  responses:
    "201":
      description: Organization created.
      content:
        application/json:
          schema: { $ref: ../../components/schemas/Organization.yaml }
          examples:
            created:
              value:
                id: org_01HKX9SY9V7H7TF8C8K7J9X4ZH
                object: organization
                name: Acme Inc.
                slug: acme
                image_url: null
                has_image: false
                members_count: 1
                pending_invitations_count: 0
                max_allowed_memberships: null
                admin_delete_enabled: true
                public_metadata: { plan: pro }
                private_metadata: {}
                created_by: user_01HKX9SY9V7H7TF8C8K7J9X4ZB
                created_at: 1714895999000
                updated_at: 1714895999000
    "401": { $ref: ../../components/responses/Unauthorized.yaml }
    "409": { $ref: ../../components/responses/Conflict.yaml }
    "422": { $ref: ../../components/responses/UnprocessableEntity.yaml }
    "429": { $ref: ../../components/responses/TooManyRequests.yaml }
