get:
  operationId: listPermissions
  summary: List permissions
  description: |
    Paginated list of permissions in the environment. Includes the
    twelve seeded system permissions by default; pass `is_system:
    false` to list custom permissions only (custom permissions
    arrive in v0.3+).
  tags: [Permissions]
  parameters:
    - $ref: ../../components/parameters/LimitParam.yaml
    - $ref: ../../components/parameters/OffsetParam.yaml
    - $ref: ../../components/parameters/OrderByParam.yaml
    - name: is_system
      in: query
      required: false
      schema: { type: boolean }
    - name: query
      in: query
      description: Free-text substring match against `key` and `name`.
      required: false
      schema: { type: string }
  responses:
    "200":
      description: A page of permissions.
      content:
        application/json:
          schema:
            allOf:
              - $ref: ../../components/schemas/PaginatedList.yaml
              - type: object
                properties:
                  data:
                    type: array
                    items: { $ref: ../../components/schemas/Permission.yaml }
    "401": { $ref: ../../components/responses/Unauthorized.yaml }
    "422": { $ref: ../../components/responses/UnprocessableEntity.yaml }
