parameters:
  - name: organization_id
    in: path
    required: true
    description: ID of the organization.
    schema: { $ref: ../components/schemas/Id.yaml }
  - name: domain_id
    in: path
    required: true
    description: ID of the domain.
    schema: { $ref: ../components/schemas/Id.yaml }

get:
  operationId: getOrganizationDomain
  summary: Get an organization domain
  description: Fetch a single `OrganizationDomain` by ID.
  tags: [Org Domains]
  responses:
    "200":
      description: The domain.
      content:
        application/json:
          schema: { $ref: ../components/schemas/OrganizationDomain.yaml }
    "401": { $ref: ../components/responses/Unauthorized.yaml }
    "404": { $ref: ../components/responses/NotFound.yaml }

patch:
  operationId: updateOrganizationDomain
  summary: Update an organization domain
  description: |
    Edit the enrollment policy. Changing the domain `name` itself
    is not supported — delete and re-add.
  tags: [Org Domains]
  parameters:
    - $ref: ../components/parameters/IdempotencyKeyHeader.yaml
  requestBody:
    required: true
    content:
      application/json:
        schema: { $ref: ../components/schemas/OrganizationDomainUpdateRequest.yaml }
        examples:
          enrollment:
            summary: Switch to manual invitations
            value:
              enrollment_mode: manual_invitation
  responses:
    "200":
      description: The updated domain.
      content:
        application/json:
          schema: { $ref: ../components/schemas/OrganizationDomain.yaml }
    "401": { $ref: ../components/responses/Unauthorized.yaml }
    "404": { $ref: ../components/responses/NotFound.yaml }
    "422": { $ref: ../components/responses/UnprocessableEntity.yaml }

delete:
  operationId: deleteOrganizationDomain
  summary: Remove a domain from an organization
  description: |
    Delete the domain. Pending invitations and suggestions
    generated by the domain are also cleared. Emits
    `organizationDomain.deleted`.
  tags: [Org Domains]
  responses:
    "204":
      description: Removed.
    "401": { $ref: ../components/responses/Unauthorized.yaml }
    "404": { $ref: ../components/responses/NotFound.yaml }
