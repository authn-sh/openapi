parameters:
  - name: organization_id
    in: path
    required: true
    description: ID of the organization.
    schema: { $ref: ../components/schemas/Id.yaml }
  - name: domain_id
    in: path
    required: true
    description: ID of the domain.
    schema: { $ref: ../components/schemas/Id.yaml }

post:
  operationId: verifyOrganizationDomain
  summary: Issue or re-issue a verification challenge
  description: |
    Issue (or re-issue) the proof challenge attached to the
    domain. The actual DNS record check is performed asynchronously
    by a worker; the response returns the current `Verification`
    state immediately, and `verified` flips to `true` once the
    check passes (a subsequent `getOrganizationDomain` reflects
    the result).

    Calling this on an already-verified domain re-issues a fresh
    challenge — useful when the operator rotates a TXT record.
  tags: [Org Domains]
  responses:
    "200":
      description: The domain with the freshly-issued verification challenge.
      content:
        application/json:
          schema: { $ref: ../components/schemas/OrganizationDomain.yaml }
    "401": { $ref: ../components/responses/Unauthorized.yaml }
    "404": { $ref: ../components/responses/NotFound.yaml }
    "422": { $ref: ../components/responses/UnprocessableEntity.yaml }
    "429": { $ref: ../components/responses/TooManyRequests.yaml }
