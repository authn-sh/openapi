type: object
description: |
  In-progress sign-in attempt. The client drives a tiny state machine:
  identify the user ‚Üí prepare a first factor ‚Üí attempt that factor ‚Üí
  (optionally) prepare/attempt a second factor ‚Üí `complete`.

  v0.1 ships `password` + `email_code` + `reset_password_email_code`
  + `ticket`. v0.2 adds `email_link` (magic link). OAuth/SAML/passkey/TOTP
  land in later milestones.

  ### Magic-link cross-device polling (PLAN ¬ß9.10)

  `email_link` is the only first-factor strategy that completes
  out-of-band ‚Äî the user clicks the link in their inbox, possibly on a
  different device, while the originating device polls for the result.

  1. Caller calls `prepareFirstFactor` with `strategy: email_link` on
     the originating device. The server emails a click-through URL of
     shape:

     `https://{env_slug}.authn.sh/v1/client/handshake?__authn_ticket=<jwt>&__authn_status=complete`

     The JWT carries `purpose=email_link`, the originating
     `sign_in_id`, and the verifying `email_address_id`. Its
     `external_verification_redirect_url` is mirrored into
     `first_factor_verification.external_verification_redirect_url`
     so the originating device can render a "Open the email" UI.

  2. The originating device calls `attemptFirstFactor` with
     `strategy: email_link` and **no payload** ‚Äî the body is just
     `{strategy: "email_link"}`. This commits the SDK to polling but
     does not synchronously verify anything.

  3. The originating device polls `getClient` (the recommended
     cadence is **every 2 seconds for the first 60 seconds, then 5
     seconds for the next 5 minutes, then stop**). Each poll returns
     the same `SignIn` with its `first_factor_verification.status`
     unchanged until the link is clicked.

  4. When the link is clicked ‚Äî possibly on a different device ‚Äî
     the click hits `clientHandshake`
     (`GET /v1/client/handshake?__authn_ticket=‚Ä¶`) on the FAPI host.
     `clientHandshake` decodes the ticket, marks the originating
     attempt's `first_factor_verification.status` as `verified` (or
     `transferable` for an unknown identifier ‚Äî see `Verification`),
     and the next poll on the originating device sees the new
     status, completing the sign-in.

  Cross-device polling does *not* use SSE or WebSockets ‚Äî plain
  `getClient` polling keeps the FAPI infrastructure simple and works
  across every browser. Servers may rate-limit polling above the
  recommended cadence (`429 too_many_requests`).
required:
  - id
  - object
  - status
  - supported_identifiers
  - supported_first_factors
  - supported_second_factors
  - first_factor_verification
  - second_factor_verification
  - identifier
  - user_data
  - created_session_id
  - abandon_at
additionalProperties: false
properties:
  id:
    $ref: ./Id.yaml
  object:
    type: string
    const: sign_in_attempt
  status:
    type: string
    enum:
      - needs_identifier
      - needs_first_factor
      - needs_second_factor
      - needs_new_password
      - needs_client_trust
      - complete
      - abandoned
    description: |
      - `needs_identifier` ‚Äî caller must supply email/phone/username.
      - `needs_first_factor` ‚Äî caller must call `prepare_first_factor` then
        `attempt_first_factor`.
      - `needs_second_factor` ‚Äî first factor passed; second pending. v0.3+.
      - `needs_new_password` ‚Äî email-code reset succeeded; caller must
        `POST /reset_password` with the new password.
      - `needs_client_trust` ‚Äî environment requires the device pass an
        out-of-band trust check (geolocation/WAF/captcha).
      - `complete` ‚Äî `created_session_id` is set; SDK can stop driving.
      - `abandoned` ‚Äî `abandon_at` passed; create a new sign-in.
  supported_identifiers:
    type: array
    items:
      type: string
      enum: [email_address, phone_number, username]
    description: Identifier kinds the environment accepts at this step.
  supported_first_factors:
    type: array
    items:
      type: object
      required: [strategy]
      additionalProperties: true
      properties:
        strategy:
          type: string
          description: |
            v0.1 emits `password`, `email_code`,
            `reset_password_email_code`. v0.2 adds `email_link`.
          examples:
            - password
            - email_code
            - email_link
            - reset_password_email_code
        email_address_id:
          type: string
        phone_number_id:
          type: string
        safe_identifier:
          type: string
          description: Redacted hint shown in UI (e.g. `j***@a***`).
    description: Concrete first factors that can be prepared.
  supported_second_factors:
    type: array
    items:
      type: object
      additionalProperties: true
    description: Empty in v0.1 (MFA ships in v0.3).
  first_factor_verification:
    description: Verification challenge for the chosen first factor, if started.
    oneOf:
      - $ref: ./Verification.yaml
      - type: "null"
  second_factor_verification:
    description: Verification challenge for the second factor, if started.
    oneOf:
      - $ref: ./Verification.yaml
      - type: "null"
  identifier:
    type: [string, "null"]
    description: Identifier the caller submitted, normalized.
  user_data:
    type: object
    description: |
      Public-safe profile preview the client can render before the user
      finishes auth. Keys mirror `User`'s `first_name`, `last_name`,
      `image_url`, `has_image`. May be `{}` until the identifier resolves.
    additionalProperties: true
  created_session_id:
    type: [string, "null"]
    description: |
      Set when `status` reaches `complete`. The new `Session` is also
      visible in the enclosing `Client.sessions[]`.
  abandon_at:
    $ref: ./Timestamp.yaml
