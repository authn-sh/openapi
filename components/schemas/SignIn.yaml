type: object
description: |
  In-progress sign-in attempt. The client drives a small state machine:
  identify the user → create a `Challenge` for a first factor → answer it
  → (optionally) create/answer a second-factor `Challenge` → `complete`.

  Per-factor `prepare-*` / `attempt-*` endpoint pairs were replaced with
  a unified `Challenge` sub-resource — see the `Challenge` schema. The
  state machine (`needs_identifier` → `needs_first_factor` →
  `needs_second_factor` → `complete`) is unchanged; only the API shape
  exposing it changed.

  v0.1 ships `password` + `email_code` + `reset_password_email_code`
  + `ticket`. v0.2 adds `email_link` (magic link). v0.3 layers MFA on
  top via the `needs_second_factor` step. v0.4 adds
  `oauth_<provider_key>` for first-factor social sign-in (see below).
  v0.5 adds `passkey` (WebAuthn) as an identifier-less first-factor
  strategy alongside OAuth. SAML lands in a later milestone.

  ### OAuth first-factor flow (v0.4, PLAN §9.3 + §9.4)

  `oauth_<provider_key>` is identifier-less — the SDK skips
  `needs_identifier` and goes straight to issuing a Challenge:

  1. Client `POST .../challenges { strategy: "oauth_<provider_key>",
     redirect_url, redirect_url_complete }`. The server mints a
     Challenge with `external_verification_redirect_url` set to the
     IdP's `/authorize` URL (with a server-signed `state` baked in)
     and `current_challenge_id` repointed.
  2. SDK performs a top-level browser navigation to that URL. The
     server-side handshake of the IdP redirect lands at
     `/v1/oauth-callback/{provider_key}` — the URL operators register
     with the IdP. That endpoint flips the Challenge to `verified`
     (or `transferable`) and 302s the browser back to
     `redirect_url_complete`.
  3. SDK reads the parent SignIn from the returning URL and either
     completes (`status: "complete"`, `created_session_id` set) or
     follows the cross-flow bounce on `transferable`.

  ### Cross-flow `transferable` (PLAN §9.4)

  - **OAuth sign-in for an unknown identifier** — IdP returned an
    identity that has no matching `User` and the parent
    `OauthProvider.allow_sign_up` is `true`. Challenge flips to
    `transferable`; SDK posts
    `POST /v1/client/sign-ups { transfer: true }` to mint a SignUp
    that completes synchronously off the same external account. With
    `allow_sign_up: false`, the Challenge instead lands `failed` with
    `oauth_account_does_not_exist`.
  - **Magic-link sign-in for an unknown identifier** (v0.2) — same
    `transferable` cross-flow as before.

  ### Magic-link cross-device polling (PLAN §9.10)

  `email_link` is the only first-factor strategy that completes
  out-of-band — the user clicks the link in their inbox, possibly on a
  different device, while the originating device polls for the result.
  The originating device polls the focused
  `GET /v1/client/sign-ins/{sid}/challenges/{cid}` resource (not the
  whole sign-in) — see the cross-device polling note on `Challenge`.

  ### Second-factor flow (`needs_second_factor`) — v0.3

  When the resolved user has at least one second factor enrolled
  (`User.two_factor_enabled: true`), a successful first-factor
  `Challenge` advances the SignIn to `needs_second_factor` instead of
  `complete`. From there:

  1. The server narrows `supported_strategies` to whichever of
     `totp` / `backup_code` the user has actually enrolled
     (`User.totp_enabled` and `User.backup_code_enabled` gate the
     list independently). The list is empty when MFA is administratively
     disabled mid-flow.
  2. Client issues a second-factor `Challenge`:
     `POST /v1/client/sign-ins/{sid}/challenges { strategy: "totp" | "backup_code" }`.
     The server stamps `step: "second"` on the resulting Challenge.
     Neither strategy needs an issue payload — `nonce` stays `null` and
     the SDK proceeds straight to `answer`.
  3. Client answers:
     `POST /v1/client/sign-ins/{sid}/challenges/{cid}/answer { code: "…" }`.
     `totp` accepts a 6-digit numeric code (`±1 step` window);
     `backup_code` accepts an `xxxx-xxxx` recovery code (single-use,
     hashed at rest). On success the Challenge flips to `verified` and
     the SignIn advances to `complete` (or `needs_client_trust` if the
     environment requires a device trust check).
  4. Failed answers count against the standard brute-force bucket. The
     SignIn stays in `needs_second_factor` until a fresh Challenge
     succeeds or `abandon_at` passes.

  Switching second-factor strategy mid-flow is allowed — issuing a
  fresh `backup_code` Challenge after a `totp` Challenge has failed
  expires the prior live challenge (`current_challenge_id` repoints to
  the new one).
required:
  - id
  - object
  - status
  - supported_identifiers
  - supported_strategies
  - current_challenge_id
  - identifier
  - user_data
  - created_session_id
  - abandon_at
additionalProperties: false
properties:
  id:
    $ref: ./Id.yaml
  object:
    type: string
    const: sign_in_attempt
  status:
    type: string
    enum:
      - needs_identifier
      - needs_first_factor
      - needs_second_factor
      - needs_new_password
      - needs_client_trust
      - complete
      - abandoned
    description: |
      - `needs_identifier` — caller must supply email/phone/username.
      - `needs_first_factor` — caller must `POST .../challenges` then
        `.../challenges/{cid}/answer`.
      - `needs_second_factor` — first factor passed; second pending.
        Caller issues a fresh Challenge with `strategy: "totp"` or
        `"backup_code"` (the server stamps `step: "second"`) and answers
        with `{ code: "…" }`. Reached only when the resolved user has
        at least one second factor enrolled. v0.3+.
      - `needs_new_password` — `reset_password_email_code` succeeded; caller
        must create a fresh `Challenge` with `strategy: password` and
        answer it with the new password, which transitions the sign-in
        to `complete`.
      - `needs_client_trust` — environment requires the device pass an
        out-of-band trust check (geolocation/WAF/captcha).
      - `complete` — `created_session_id` is set; SDK can stop driving.
      - `abandoned` — `abandon_at` passed; create a new sign-in.
  supported_identifiers:
    type: array
    items:
      type: string
      enum: [email_address, phone_number, username]
    description: Identifier kinds the environment accepts at this step.
  supported_strategies:
    type: array
    items: { type: string }
    description: |
      Strategies the client may issue next given the sign-in's current
      state. The server narrows this list as the flow progresses:

      - `needs_first_factor` — first-factor strategies the environment
        + identifier support: `password`, `email_code`, `email_link`,
        `reset_password_email_code`, `ticket`, plus an
        `oauth_<provider_key>` entry for every enabled `OauthProvider`
        row with `allow_sign_in: true` (e.g. `oauth_google`,
        `oauth_acme_corp_sso`), plus `passkey` when the identifier
        resolves to a user with ≥1 verified `Passkey` (or when
        the sign-in was started in username-less mode and the
        environment has WebAuthn enabled). The OAuth entries
        surface independently of the supplied `identifier` —
        they're identifier-less.
      - `needs_second_factor` — narrowed to second-factor strategies
        the resolved user has enrolled. v0.3 surface: `totp`,
        `backup_code`. Each entry maps to whichever of
        `User.totp_enabled` / `User.backup_code_enabled` is `true`.
        Empty when the user has no second factor enrolled (the SignIn
        wouldn't be in `needs_second_factor` in that case — see the
        per-status notes).
      - `needs_new_password` — `[password]`.
      - `complete` / `abandoned` — empty.

      Switching strategy mid-step is allowed — the server accepts any
      currently-listed value on the next `POST .../challenges`.
    examples:
      - [password, email_code, email_link, reset_password_email_code]
      - [password, email_code, oauth_google, oauth_github, passkey]
      - [totp, backup_code]
      - [totp]
      - [backup_code]
  current_challenge_id:
    description: |
      Pointer to the live `Challenge` if one's in flight. `null` when
      the sign-in has no live challenge — either none has been created
      yet, the previous one was answered to a terminal status, or the
      flow itself is `complete` / `abandoned`.
    oneOf:
      - $ref: ./Id.yaml
      - type: "null"
  identifier:
    type: [string, "null"]
    description: Identifier the caller submitted, normalized.
  user_data:
    type: object
    description: |
      Public-safe profile preview the client can render before the user
      finishes auth. Keys mirror `User`'s `first_name`, `last_name`,
      `image_url`, `has_image`. May be `{}` until the identifier resolves.
    additionalProperties: true
  created_session_id:
    type: [string, "null"]
    description: |
      Set when `status` reaches `complete`. The new `Session` is also
      visible in the enclosing `Client.sessions[]`.
  abandon_at:
    $ref: ./Timestamp.yaml
