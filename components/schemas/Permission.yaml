type: object
description: |
  An atomic capability. Members hold permissions transitively
  through their `OrganizationMembership.role`. The
  `org:<feature>:<verb>` naming is a convention, not enforced by
  schema, so dashboards can list custom permissions cleanly.

  System permissions (`is_system: true`) are seeded per environment
  at bootstrap and cannot be edited or deleted. Custom permissions
  are reserved for v0.3+ — v0.2 ships only the system catalog.

  ### System permissions catalog (v0.2)

  Every environment is seeded with exactly these thirteen system
  permissions:

  | `key` | Purpose |
  |---|---|
  | `org:profile:read` | Read org name, slug, image, metadata. |
  | `org:profile:manage` | Edit org name, slug, image, metadata. |
  | `org:profile:delete` | Delete the org (subject to `admin_delete_enabled`). |
  | `org:memberships:read` | List members and pending requests. |
  | `org:memberships:manage` | Invite, remove, change roles, accept membership requests. |
  | `org:invitations:read` | List outgoing invitations. |
  | `org:invitations:manage` | Create, revoke, and resend invitations. |
  | `org:domains:read` | List verified domains. |
  | `org:domains:manage` | Add, verify, change enrollment mode, delete domains. |
  | `org:roles:read` | List roles and their permission assignments. |
  | `org:roles:manage` | Create, update, and delete roles; assign permissions. |
  | `org:permissions:read` | List available permissions. |
  | `org:permissions:manage` | Create and delete custom permissions. |
required:
  - id
  - object
  - key
  - name
  - is_system
  - created_at
  - updated_at
additionalProperties: false
properties:
  id:
    $ref: ./Id.yaml
  object:
    type: string
    const: permission
  key:
    type: string
    minLength: 1
    maxLength: 128
    pattern: "^org:[a-z][a-z0-9_]*:[a-z][a-z0-9_]*$"
    description: |
      Stable, lowercase, snake-case identifier in the form
      `org:<feature>:<verb>`. System permissions live under the
      reserved `org:*` prefix.
    examples:
      - org:memberships:manage
      - org:domains:read
      - org:billing:export
  name:
    type: string
    minLength: 1
    maxLength: 256
  description:
    type: [string, "null"]
    maxLength: 1024
  is_system:
    type: boolean
    description: |
      `true` for the seeded system catalog above. System
      permissions cannot be edited or deleted; only their `name`
      and `description` may be localized at render time.
  created_at:
    $ref: ./Timestamp.yaml
  updated_at:
    $ref: ./Timestamp.yaml
