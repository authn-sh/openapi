type: object
description: Body for `POST /v1/organizations/{org_id}/domains`.
required: [name]
additionalProperties: false
properties:
  name:
    type: string
    minLength: 1
    maxLength: 253
  enrollment_mode:
    type: string
    enum:
      - manual_invitation
      - automatic_invitation
      - automatic_suggestion
    default: manual_invitation
  affiliation_email_address:
    type: string
    format: email
    description: |
      Optional address to use as the `email_code` verification target
      when an operator later issues an `email_code` challenge against
      this domain. Must sit at the domain being verified.
