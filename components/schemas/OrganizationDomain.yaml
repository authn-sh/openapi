type: object
description: |
  A domain attached to an `Organization`. Once verified, drives
  domain-based enrollment — depending on `enrollment_mode`, sign-ups
  with a matching email get an automatic invitation, an automatic
  membership-request suggestion, or nothing at all.

  Verification reuses the existing `Verification` shape; the proof
  channel (DNS TXT or email-to-`affiliation_email_address`) is
  recorded in `verification.strategy` (`dns` or `email_code`).
required:
  - id
  - object
  - organization_id
  - name
  - verified
  - enrollment_mode
  - total_pending_invitations
  - total_pending_suggestions
  - created_at
  - updated_at
additionalProperties: false
properties:
  id:
    $ref: ./Id.yaml
  object:
    type: string
    const: organization_domain
  organization_id:
    type: string
  name:
    type: string
    minLength: 1
    maxLength: 253
    description: |
      The domain (no scheme, no path) — e.g. `acme.com`. Lowercased
      and IDN-normalized on write.
  verified:
    type: boolean
    description: |
      `true` once `verification.status === 'verified'`. The two
      flags are kept in sync but `verified` is denormalized for
      cheap list filtering.
  enrollment_mode:
    type: string
    enum:
      - manual_invitation
      - automatic_invitation
      - automatic_suggestion
    description: |
      - `manual_invitation` — domain match has no effect on sign-up;
        members must be invited explicitly.
      - `automatic_invitation` — sign-ups with a matching email
        skip the invitation step and join as `default_role`.
      - `automatic_suggestion` — sign-ups with a matching email get
        an `OrganizationMembershipRequest` row that an admin must
        approve.
  verification:
    description: |
      Latest verification challenge. `null` when verification is
      not in flight (e.g. an admin has just rotated the token).
    oneOf:
      - $ref: ./Verification.yaml
      - type: "null"
  affiliation_email_address:
    type: [string, "null"]
    format: email
    description: |
      Address used as the `email_code` verification target when
      `verification.strategy === 'email_code'`. Always sits at the
      domain being verified (e.g. `admin@acme.com`).
  total_pending_invitations:
    type: integer
    minimum: 0
    description: |
      Pending `OrganizationInvitation` rows generated by this
      domain when `enrollment_mode === 'automatic_invitation'`.
  total_pending_suggestions:
    type: integer
    minimum: 0
    description: |
      Pending `OrganizationMembershipRequest` rows generated by
      this domain when `enrollment_mode === 'automatic_suggestion'`.
  created_at:
    $ref: ./Timestamp.yaml
  updated_at:
    $ref: ./Timestamp.yaml
