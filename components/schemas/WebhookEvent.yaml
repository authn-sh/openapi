type: object
description: |
  Envelope wrapping every webhook delivery. Customers receive this as
  the JSON body of a `POST` to the configured endpoint, signed via the
  scheme below.

  ## Signature contract

  Each delivery carries three headers:

  - `svix-id` — message ID (also the `WebhookDelivery.id`).
  - `svix-timestamp` — unix-second epoch when the server signed the body.
  - `svix-signature` — space-separated list of `v1,<base64>` entries.
    Multiple entries appear during a `rotateWebhookEndpointSecret`
    overlap window; verifiers accept any.

  Verifier formula:

  ```
  signed_payload = "{svix-id}.{svix-timestamp}.{raw_request_body}"
  candidate      = base64(HMAC-SHA256(decoded(signing_secret), signed_payload))
  ```

  Compare each `v1,<…>` entry constant-time against `candidate`; refuse
  the request if no match is found, if `svix-timestamp` is more than
  300 seconds away from now, or if any of the three headers are
  missing.

  ## Magic-link emails

  Magic-link sign-in / sign-up does **not** introduce its own event
  type. The outgoing email is reported through the existing
  `email.created` event with the rendered subject + body, exactly the
  same as for `email_code` and `reset_password_email_code`.
required:
  - id
  - object
  - type
  - data
  - timestamp
  - instance_id
additionalProperties: false
properties:
  id:
    $ref: ./Id.yaml
    description: Same as `WebhookDelivery.id` and the `svix-id` header.
  object:
    type: string
    const: event
  type:
    type: string
    description: |
      Stable event type identifier. v0.1 shipped the `user.*`,
      `session.*`, `email.*`, and `invitation.*` events. v0.2 adds the
      organization, role, and permission events. v0.4 adds the
      social-IdP, external-account, and phone-number events. v0.5
      adds passkey lifecycle, the appearance-config update event,
      and the localization-config update event. v0.6 adds the
      enterprise-SSO + SCIM events.
    enum:
      # v0.1
      - user.created
      - user.updated
      - user.deleted
      - session.created
      - session.ended
      - session.removed
      - session.revoked
      - email.created
      - invitation.created
      - invitation.accepted
      - invitation.revoked
      # v0.2
      - session.touched
      - organization.created
      - organization.updated
      - organization.deleted
      - organizationMembership.created
      - organizationMembership.updated
      - organizationMembership.deleted
      - organizationInvitation.created
      - organizationInvitation.accepted
      - organizationInvitation.revoked
      - organizationDomain.created
      - organizationDomain.updated
      - organizationDomain.deleted
      - organizationMembershipRequest.created
      - organizationMembershipRequest.accepted
      - organizationMembershipRequest.rejected
      - role.created
      - role.updated
      - role.deleted
      - permission.created
      - permission.updated
      - permission.deleted
      # v0.4
      - oauthProvider.created
      - oauthProvider.updated
      - oauthProvider.deleted
      - externalAccount.connected
      - externalAccount.unlinked
      - phoneNumber.created
      - phoneNumber.verified
      - phoneNumber.removed
      # v0.5
      - passkey.added
      - passkey.removed
      - instance.config.appearance_updated
      - localization.updated
      # v0.6
      - enterpriseConnection.created
      - enterpriseConnection.updated
      - enterpriseConnection.deleted
      - enterpriseAccount.connected
      - enterpriseAccount.unlinked
      - scimToken.issued
      - scimToken.revoked
      - scimUser.provisioned
      - scimUser.deprovisioned
      # v0.7
      - jwtTemplate.created
      - jwtTemplate.updated
      - jwtTemplate.deleted
      - oauthApplication.created
      - oauthApplication.updated
      - oauthApplication.deleted
      - authorizationGrant.granted
      - authorizationGrant.revoked
  data:
    description: |
      The resource snapshot. Concrete shape depends on `type`:

      - `user.*` → `User`
      - `session.*` → `Session`
      - `email.*` → `EmailAddress`
      - `invitation.*` → `Invitation`
      - `organization.*` → `Organization`
      - `organizationMembership.*` → `OrganizationMembership` (with
        populated `public_user_data`, so handlers don't need a
        follow-up `getUser`)
      - `organizationInvitation.*` → `OrganizationInvitation`
      - `organizationDomain.*` → `OrganizationDomain`
      - `organizationMembershipRequest.*` → `OrganizationMembershipRequest`
      - `role.*` → `Role`
      - `permission.*` → `Permission` (custom permissions only —
        system permissions are seeded and don't emit lifecycle events)
      - `oauthProvider.*` → `OauthProvider` (`client_secret` is never
        in the payload — encrypted at rest, write-only)
      - `externalAccount.*` → `ExternalAccount` (the IdP-issued
        `access_token` / `refresh_token` / `id_token` are never in the
        payload either)
      - `phoneNumber.*` → `PhoneNumber`
      - `passkey.*` → `Passkey`
      - `enterpriseConnection.*` → `EnterpriseConnection`
        (`oidc_client_secret` and `saml_signing_key` are never in the
        payload — encrypted at rest, write-only)
      - `enterpriseAccount.*` → `EnterpriseAccount`
      - `scimToken.*` → `ScimToken` (plaintext `token` is never in
        the payload — `writeOnly: true`, returned only on the
        single-shot issue response)
      - `scimUser.*` →
        `{ user: User, enterprise_connection_id, organization_id }`
        (carries the connection that drove provisioning + the
        scoping org so handlers can route without a follow-up
        lookup)
      - `instance.config.appearance_updated` →
        `{ previous: Appearance, current: Appearance,
           diff: Appearance }`. `diff` is the partial-shape blob
        the operator's `PATCH /v1/instance/appearance` request body
        carried (or the full new shape on a `PUT`).
      - `localization.updated` →
        `{ previous: Localization, current: Localization,
           diff: LocalizationUpdateRequest }`. `diff` is the partial
        the operator submitted via `PATCH /v1/instance/localization`
        (or the full new shape on a `PUT`).
      - `jwtTemplate.*` → `JwtTemplate` (`custom_signing_key` is
        never in the payload — `writeOnly: true`, encrypted at rest)
      - `oauthApplication.*` → `OauthApplication` (`client_secret`
        is never in the payload — `writeOnly: true`, returned only
        on the create + rotate-secret responses)
      - `authorizationGrant.*` →
        `{ user_id, oauth_application_id, scopes[], granted_at,
           revoked_at }` (compact projection; consumers reading the
        full `AuthorizationGrant` row should look it up by
        `(user_id, oauth_application_id)`)
    oneOf:
      - $ref: ./User.yaml
      - $ref: ./Session.yaml
      - $ref: ./EmailAddress.yaml
      - $ref: ./Invitation.yaml
      - $ref: ./Organization.yaml
      - $ref: ./OrganizationMembership.yaml
      - $ref: ./OrganizationInvitation.yaml
      - $ref: ./OrganizationDomain.yaml
      - $ref: ./OrganizationMembershipRequest.yaml
      - $ref: ./Role.yaml
      - $ref: ./Permission.yaml
      - $ref: ./OauthProvider.yaml
      - $ref: ./ExternalAccount.yaml
      - $ref: ./PhoneNumber.yaml
      - $ref: ./Passkey.yaml
      - $ref: ./EnterpriseConnection.yaml
      - $ref: ./EnterpriseAccount.yaml
      - $ref: ./ScimToken.yaml
      - $ref: ./JwtTemplate.yaml
      - $ref: ./OauthApplication.yaml
      - type: object
        description: |
          `authorizationGrant.*` payload — compact projection of
          the `AuthorizationGrant` row.
        required: [user_id, oauth_application_id, scopes, granted_at, revoked_at]
        additionalProperties: false
        properties:
          user_id:
            $ref: ./Id.yaml
          oauth_application_id:
            $ref: ./Id.yaml
          scopes:
            type: array
            items:
              type: string
          granted_at:
            $ref: ./Timestamp.yaml
          revoked_at:
            oneOf:
              - $ref: ./Timestamp.yaml
              - type: "null"
            description: |
              `null` on `authorizationGrant.granted`; populated on
              `authorizationGrant.revoked`.
      - type: object
        description: |
          `scimUser.*` payload.
        required: [user, enterprise_connection_id, organization_id]
        additionalProperties: false
        properties:
          user:
            $ref: ./User.yaml
          enterprise_connection_id:
            oneOf:
              - $ref: ./Id.yaml
              - type: "null"
            description: |
              Source connection. `null` for SCIM-only provisioning
              when no `EnterpriseConnection` was involved (token
              issued for direct directory sync against a workspace
              IdP that doesn't drive SSO).
          organization_id:
            $ref: ./Id.yaml
            description: Scoping organization.
      - type: object
        description: |
          `instance.config.appearance_updated` payload.
        required: [previous, current, diff]
        additionalProperties: false
        properties:
          previous: { $ref: ./Appearance.yaml }
          current:  { $ref: ./Appearance.yaml }
          diff:     { $ref: ./Appearance.yaml }
      - type: object
        description: |
          `localization.updated` payload.
        required: [previous, current, diff]
        additionalProperties: false
        properties:
          previous: { $ref: ./Localization.yaml }
          current:  { $ref: ./Localization.yaml }
          diff:     { $ref: ./LocalizationUpdateRequest.yaml }
  timestamp:
    $ref: ./Timestamp.yaml
  instance_id:
    type: string
    description: ID of the originating `Environment` (so customers can route by tenant).
  was_test:
    type: boolean
    default: false
    description: |
      `true` when the event originated from a test-mode user / session
      (per `Environment.test_mode`). Customers should usually filter
      these out in production handlers.
