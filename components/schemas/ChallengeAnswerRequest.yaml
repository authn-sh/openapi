type: object
description: |
  Body for `POST /‚Ä¶/challenges/{cid}/answer` against any parent that
  owns challenges (`SignIn`, `SignUp`, `EmailAddress`,
  `OrganizationDomain`). The challenge already knows its strategy;
  the body carries the strategy-specific answer.

  - `password` ‚Äî `{ password: "‚Ä¶" }`.
  - `email_code` / `reset_password_email_code` ‚Äî `{ code: "123456" }`.
  - `ticket` ‚Äî `{ ticket: "‚Ä¶" }`.
  - `email_link` ‚Äî `{ }` (empty body). This commits the SDK to polling
    `GET .../challenges/{cid}`; the verification happens out-of-band when
    the user clicks the magic link. The response is the polled state,
    not a synchronous success.
  - `domain_dns_txt` ‚Äî `{ }` (empty body). Hints the server to attempt
    the DNS lookup right now. The response reflects the immediate
    result ‚Äî `verified` if the TXT record was visible, `pending` if
    the lookup was queued. The server keeps polling DNS in the
    background regardless.
  - `totp` ‚Äî `{ code: "123456" }`. 6-digit numeric TOTP. Server checks
    against the user's stored secret with a `¬±1 step` (30s) window.
    Only legal on a `step: "second"` Challenge bound to a SignIn.
  - `backup_code` ‚Äî `{ code: "abcd-efgh" }`. Single-use recovery code
    in `xxxx-xxxx` format. The matching row is marked consumed on
    success and can never be reused. Only legal on a `step: "second"`
    Challenge bound to a SignIn.
  - `passkey` ‚Äî `{ assertion: { id, raw_id, response: { client_data_json,
    authenticator_data, signature, user_handle }, type } }`. The SDK
    runs `navigator.credentials.get(challenge.request_options)` and
    posts the resulting `AuthenticatorAssertionResponse` verbatim,
    base64url-encoded. The server verifies the signature against
    the stored public key for the matching `Passkey` row, checks
    the embedded challenge / origin / RP-ID, and bumps the row's
    monotonic sign-count.

  On a `reset_password_email_code` answer the parent SignIn transitions
  to `needs_new_password`; the caller then creates a fresh `password`
  challenge and answers it with the new password, which advances the
  sign-in to `complete`.
additionalProperties: false
properties:
  password:  { type: string }
  code:      { type: string }
  ticket:    { type: string }
  assertion:
    description: |
      WebAuthn assertion response for `passkey` challenges. Bound
      to the parent challenge's `request_options.challenge` nonce.
    $ref: ./PasskeyAssertion.yaml
examples:
  - { password: "correct horse battery staple" }
  - { code: "542178" }
  - { code: "abcd-efgh" }
  - {}
  - assertion:
      id: a2V5LWlk
      raw_id: a2V5LWlk
      type: public-key
      response:
        client_data_json: eyJ0eXBlIjoid2ViYXV0aG4uZ2V0Iiwi‚Ä¶
        authenticator_data: SZYN5YgOjGh0NBcPZHZgW4_krrmihjLHmVz‚Ä¶
        signature: MEUCIQDH7dy‚Ä¶
        user_handle: dXNlci1oYW5kbGU
