type: object
description: |
  In-progress sign-up attempt. Tracks which fields the environment
  requires, which the caller has already supplied, and which still need
  verification via a `Challenge`.

  The per-attribute `verifications.{email_address,phone_number,…}` map
  was replaced with a single `current_challenge_id` pointer plus
  `supported_strategies[]`. Callers create a `Challenge` against the
  sign-up via `POST /v1/client/sign-ups/{sid}/challenges` and answer it
  via `POST /v1/client/sign-ups/{sid}/challenges/{cid}/answer`. Sign-ups
  only have `step: single` challenges — no MFA layered on top.

  v0.1 supports email + password sign-ups via `email_code`. v0.2 adds
  `email_link` (magic link). v0.4 adds `oauth_<provider_key>` —
  identifier-less social sign-up that mints a `User` +
  `ExternalAccount` together. v0.5 adds `passkey` as a documented
  strategy on completed sign-ups so SDKs can prompt the new user to
  enroll a passkey immediately. SAML sign-ups land in a later
  milestone.

  ### OAuth sign-up flow (v0.4, PLAN §9.3 + §9.4)

  Mirrors the SignIn OAuth flow:

  1. Client `POST .../challenges { strategy: "oauth_<provider_key>",
     redirect_url, redirect_url_complete }`.
  2. Server mints a Challenge with
     `external_verification_redirect_url` set to the IdP authorize
     URL and `current_challenge_id` repointed.
  3. SDK navigates the browser to that URL. The IdP redirects back to
     `/v1/oauth-callback/{provider_key}`, which on success creates the
     `User` + `ExternalAccount`, advances the SignUp to `complete`,
     and 302s back to `redirect_url_complete`.

  Subject to `OauthProvider.allow_sign_up` — when `false`, the
  Challenge lands `failed` with `oauth_account_does_not_exist`
  instead of creating a new `User`.

  ### Magic-link cross-device polling (PLAN §9.10)

  Same as sign-in `email_link` — the click can land on a different
  device. The originating device polls the focused
  `GET /v1/client/sign-ups/{sid}/challenges/{cid}` resource. See the
  cross-device polling note on `Challenge`.

  If the address being signed up already has a `User`, the challenge
  flips to `transferable` instead of `verified` and the SDK should
  bounce to sign-in via `POST /v1/client/sign-ins { transfer: true }`.
required:
  - id
  - object
  - status
  - required_fields
  - optional_fields
  - missing_fields
  - unverified_fields
  - supported_strategies
  - current_challenge_id
  - password_enabled
  - unsafe_metadata
  - public_metadata
  - created_session_id
  - created_user_id
  - abandon_at
additionalProperties: false
properties:
  id:
    $ref: ./Id.yaml
  object:
    type: string
    const: sign_up_attempt
  status:
    type: string
    enum:
      - missing_requirements
      - complete
      - transferable
      - abandoned
    description: |
      - `missing_requirements` — `missing_fields` or `unverified_fields`
        is non-empty; caller must `PATCH` to fill, or create+answer a
        `Challenge` to verify.
      - `complete` — `created_user_id` and `created_session_id` are set;
        SDK can stop driving.
      - `transferable` — the verified identity belongs in the opposite
        flow. v0.2: a sign-up `email_link` was clicked for an address
        that already has a `User` — the SDK should bounce to sign-in
        with `POST /v1/client/sign-ins { transfer: true }`. v0.4: a
        sign-up via `oauth_<provider_key>` returned an IdP identity
        that already has an `ExternalAccount` — same bounce.
      - `abandoned` — `abandon_at` passed.
  required_fields:
    type: array
    items: { type: string }
    description: Fields the environment requires for sign-up to complete.
  optional_fields:
    type: array
    items: { type: string }
  missing_fields:
    type: array
    items: { type: string }
    description: |
      Subset of `required_fields` not yet supplied. When non-empty,
      `status` stays `missing_requirements`.
  unverified_fields:
    type: array
    items: { type: string }
    description: |
      Fields the caller supplied but that need a verification challenge
      (`email_address`, `phone_number`).
  supported_strategies:
    type: array
    items: { type: string }
    description: |
      Strategies the client may issue next given the sign-up's current
      state. The server narrows this list as the flow progresses.
      `email_code`, `email_link` — verify the supplied
      `email_address`. `oauth_<provider_key>` — identifier-less
      social sign-up; one entry per enabled `OauthProvider` row with
      `allow_sign_up: true`. `passkey` — surfaced post-completion so
      SDKs can chain a passkey enrollment ceremony on the freshly
      minted `User`. Empty when the flow is `abandoned`.
    examples:
      - [email_code, email_link]
      - [email_code, oauth_google, oauth_github]
  current_challenge_id:
    description: |
      Pointer to the live `Challenge` if one's in flight. `null` when
      the sign-up has no live challenge.
    oneOf:
      - $ref: ./Id.yaml
      - type: "null"
  username:
    type: [string, "null"]
  email_address:
    type: [string, "null"]
    format: email
  phone_number:
    type: [string, "null"]
  first_name:
    type: [string, "null"]
  last_name:
    type: [string, "null"]
  password_enabled:
    type: boolean
    description: '`true` once the caller has set a password on this attempt.'
  unsafe_metadata:
    $ref: ./Metadata.yaml
  public_metadata:
    $ref: ./Metadata.yaml
  created_session_id:
    type: [string, "null"]
  created_user_id:
    type: [string, "null"]
  abandon_at:
    $ref: ./Timestamp.yaml
