type: object
description: |
  In-progress sign-up attempt. Tracks which fields the environment
  requires, which the caller has already supplied, which still need
  verification, and the per-attribute verification challenges.

  v0.1 supports email + password sign-ups via `email_code`. v0.2 adds
  `email_link` (magic link). Phone, OAuth, SAML, and passkey sign-ups
  ship in later milestones.

  ### Magic-link cross-device polling (PLAN ┬¦9.10)

  Sign-up `email_link` works the same way as sign-in `email_link`
  ŌĆö the click can happen on a different device while the originating
  device polls the FAPI for completion. The full handshake is:

  1. Caller calls `prepareVerification` with `strategy: email_link`.
     The server emails a click-through URL of shape:

     `https://{env_slug}.authn.sh/v1/client/handshake?__authn_ticket=<jwt>&__authn_status=complete`

     The JWT carries `purpose=email_link`, the `sign_up_id`, and the
     attribute being verified (always `email_address` in v0.2). The
     URL is mirrored into the matching
     `verifications.email_address.external_verification_redirect_url`
     so the SDK can render a "Open the email" UI.

  2. Caller calls `attemptVerification` with
     `strategy: email_link` and **no payload** ŌĆö body is just
     `{strategy: "email_link"}`. This commits the SDK to polling.

  3. Caller polls `getClient` (recommended cadence: **every 2
     seconds for the first 60 seconds, then 5 seconds for the next
     5 minutes**) until the matching
     `verifications.email_address.status` flips to `verified` or
     `transferable`.

  4. The click on any device hits `clientHandshake`
     (`GET /v1/client/handshake?__authn_ticket=ŌĆ”`), which marks the
     verification on the originating attempt and lets the polling
     device complete.

  If the address being signed up already has a `User`, the
  verification flips to `transferable` instead of `verified` and the
  SDK should bounce to sign-in via
  `POST /v1/client/sign_ins { transfer: true }` ŌĆö see the
  `Verification` schema for the full transferable rules.
required:
  - id
  - object
  - status
  - required_fields
  - optional_fields
  - missing_fields
  - unverified_fields
  - verifications
  - password_enabled
  - unsafe_metadata
  - public_metadata
  - created_session_id
  - created_user_id
  - abandon_at
additionalProperties: false
properties:
  id:
    $ref: ./Id.yaml
  object:
    type: string
    const: sign_up_attempt
  status:
    type: string
    enum:
      - missing_requirements
      - complete
      - transferable
      - abandoned
    description: |
      - `missing_requirements` ŌĆö `missing_fields` or `unverified_fields`
        is non-empty; caller must `PATCH` to fill / `attempt_verification`
        to verify.
      - `complete` ŌĆö `created_user_id` and `created_session_id` are set;
        SDK can stop driving.
      - `transferable` ŌĆö the verified identity belongs in the opposite
        flow. v0.2: a sign-up `email_link` was clicked for an address
        that already has a `User` ŌĆö the SDK should bounce to sign-in
        with `POST /v1/client/sign_ins { transfer: true }`. v0.4
        extends this to OAuth.
      - `abandoned` ŌĆö `abandon_at` passed.
  required_fields:
    type: array
    items: { type: string }
    description: Fields the environment requires for sign-up to complete.
  optional_fields:
    type: array
    items: { type: string }
  missing_fields:
    type: array
    items: { type: string }
    description: |
      Subset of `required_fields` not yet supplied. When non-empty,
      `status` stays `missing_requirements`.
  unverified_fields:
    type: array
    items: { type: string }
    description: |
      Fields the caller supplied but that need a verification challenge
      (`email_address`, `phone_number`).
  verifications:
    type: object
    description: |
      Map of attribute name ŌåÆ `Verification`. Populated by
      `prepare_verification` and updated by `attempt_verification`.
    additionalProperties:
      oneOf:
        - $ref: ./Verification.yaml
        - type: "null"
    examples:
      - email_address:
          status: unverified
          strategy: email_code
          attempts: 0
          expire_at: 1714724000000
          external_verification_redirect_url: null
          nonce: null
          error: null
  username:
    type: [string, "null"]
  email_address:
    type: [string, "null"]
    format: email
  phone_number:
    type: [string, "null"]
  first_name:
    type: [string, "null"]
  last_name:
    type: [string, "null"]
  password_enabled:
    type: boolean
    description: '`true` once the caller has set a password on this attempt.'
  unsafe_metadata:
    $ref: ./Metadata.yaml
  public_metadata:
    $ref: ./Metadata.yaml
  created_session_id:
    type: [string, "null"]
  created_user_id:
    type: [string, "null"]
  abandon_at:
    $ref: ./Timestamp.yaml
