type: object
description: |
  In-progress sign-up attempt. Tracks which fields the environment
  requires, which the caller has already supplied, and which still need
  verification via a `Challenge`.

  The per-attribute `verifications.{email_address,phone_number,‚Ä¶}` map
  was replaced with a single `current_challenge_id` pointer plus
  `supported_strategies[]`. Callers create a `Challenge` against the
  sign-up via `POST /v1/client/sign-ups/{sid}/challenges` and answer it
  via `POST /v1/client/sign-ups/{sid}/challenges/{cid}/answer`. Sign-ups
  only have `step: single` challenges ‚Äî no MFA layered on top.

  v0.1 supports email + password sign-ups via `email_code`. v0.4 adds
  `oauth_<provider_key>` ‚Äî identifier-less social sign-up that mints a
  `User` + `ExternalAccount` together. v0.5 adds `passkey` as a documented
  strategy on completed sign-ups so SDKs can prompt the new user to
  enroll a passkey immediately. v0.6 adds `enterprise_sso` and `saml`
  ‚Äî identifier-less enterprise sign-up that mints a `User` +
  `EnterpriseAccount` together. When the IdP returns an identity that
  already has a `User`, the Challenge flips to `transferable` and the
  SDK bounces to sign-in via
  `POST /v1/client/sign-ins { transfer: true }`.

  ### OAuth sign-up flow (v0.4, PLAN ¬ß9.3 + ¬ß9.4)

  Mirrors the SignIn OAuth flow:

  1. Client `POST .../challenges { strategy: "oauth_<provider_key>",
     redirect_url, redirect_url_complete }`.
  2. Server mints a Challenge with
     `external_verification_redirect_url` set to the IdP authorize
     URL and `current_challenge_id` repointed.
  3. SDK navigates the browser to that URL. The IdP redirects back to
     `/v1/oauth-callback/{provider_key}`, which on success creates the
     `User` + `ExternalAccount`, advances the SignUp to `complete`,
     and 302s back to `redirect_url_complete`.

  Subject to `OauthProvider.allow_sign_up` ‚Äî when `false`, the
  Challenge lands `failed` with `oauth_account_does_not_exist`
  instead of creating a new `User`.

required:
  - id
  - object
  - status
  - required_fields
  - optional_fields
  - missing_fields
  - unverified_fields
  - supported_strategies
  - current_challenge_id
  - transferable_to_signin
  - target_flow
  - password_enabled
  - unsafe_metadata
  - public_metadata
  - created_session_id
  - created_user_id
  - abandon_at
additionalProperties: false
properties:
  id:
    $ref: ./Id.yaml
  object:
    type: string
    const: sign_up_attempt
  status:
    type: string
    enum:
      - missing_requirements
      - complete
      - transferable
      - abandoned
    description: |
      - `missing_requirements` ‚Äî `missing_fields` or `unverified_fields`
        is non-empty; caller must `PATCH` to fill, or create+answer a
        `Challenge` to verify.
      - `complete` ‚Äî `created_user_id` and `created_session_id` are set;
        SDK can stop driving.
      - `transferable` ‚Äî the verified identity belongs in the opposite
        flow. v0.4: a sign-up via `oauth_<provider_key>` returned an
        IdP identity that already has an `ExternalAccount` ‚Äî the SDK
        should bounce to sign-in with
        `POST /v1/client/sign-ins { transfer: true }`. v0.6: a
        sign-up via `enterprise_sso` / `saml` returned an IdP-asserted
        identity that already has a `User` ‚Äî same bounce. In every
        case, `target_flow` is set to `sign_in` and
        `transferable_to_signin` is `true` so consumers can branch
        without re-parsing the cause.
      - `abandoned` ‚Äî `abandon_at` passed.
  required_fields:
    type: array
    items: { type: string }
    description: Fields the environment requires for sign-up to complete.
  optional_fields:
    type: array
    items: { type: string }
  missing_fields:
    type: array
    items: { type: string }
    description: |
      Subset of `required_fields` not yet supplied. When non-empty,
      `status` stays `missing_requirements`.
  unverified_fields:
    type: array
    items: { type: string }
    description: |
      Fields the caller supplied but that need a verification challenge
      (`email_address`, `phone_number`).
  supported_strategies:
    type: array
    items: { type: string }
    description: |
      Strategies the client may issue next given the sign-up's current
      state. The server narrows this list as the flow progresses.
      `email_code` ‚Äî verify the supplied `email_address`.
      `oauth_<provider_key>` ‚Äî identifier-less
      social sign-up; one entry per enabled `OauthProvider` row with
      `allow_sign_up: true`. `passkey` ‚Äî surfaced post-completion so
      SDKs can chain a passkey enrollment ceremony on the freshly
      minted `User`. `enterprise_sso` / `saml` (v0.6) ‚Äî
      identifier-less enterprise sign-up; surfaces when the
      environment has ‚â•1 `EnterpriseConnection` reachable. Empty
      when the flow is `abandoned`.
    examples:
      - [email_code]
      - [email_code, oauth_google, oauth_github]
      - [email_code, enterprise_sso]
  current_challenge_id:
    description: |
      Pointer to the live `Challenge` if one's in flight. `null` when
      the sign-up has no live challenge.
    oneOf:
      - $ref: ./Id.yaml
      - type: "null"
  transferable_to_signin:
    type: boolean
    default: false
    description: |
      `true` when `status == "transferable"` and `target_flow ==
      "sign_in"` ‚Äî the SDK should bounce to sign-in via
      `POST /v1/client/sign-ins { transfer: true }`. Convenience
      flag so consumers don't have to string-compare `target_flow`.
      `false` otherwise.
  target_flow:
    type: [string, "null"]
    enum: [sign_in, sign_up, null]
    description: |
      Populated when `status == "transferable"`. Indicates which flow
      the SDK should hand the upstream identity off to:

      - `sign_in` ‚Äî the resolved identity already has a `User`; SDK
        posts `POST /v1/client/sign-ins { transfer: true }`. This is
        the only direction v0.6 emits on a SignUp.
      - `sign_up` ‚Äî reserved for the mirror direction (kept in the
        enum so consumers handle both `SignIn` and `SignUp` snapshots
        uniformly).

      `null` for every other `status` value.
  username:
    type: [string, "null"]
  email_address:
    type: [string, "null"]
    format: email
  phone_number:
    type: [string, "null"]
  first_name:
    type: [string, "null"]
  last_name:
    type: [string, "null"]
  password_enabled:
    type: boolean
    description: '`true` once the caller has set a password on this attempt.'
  unsafe_metadata:
    $ref: ./Metadata.yaml
  public_metadata:
    $ref: ./Metadata.yaml
  created_session_id:
    type: [string, "null"]
  created_user_id:
    type: [string, "null"]
  abandon_at:
    $ref: ./Timestamp.yaml
examples:
  - id: sua_01HKX9SY9V7H7TF8C8K7J9X4ZA
    object: sign_up_attempt
    status: transferable
    required_fields: []
    optional_fields: []
    missing_fields: []
    unverified_fields: []
    supported_strategies: []
    current_challenge_id: null
    transferable_to_signin: true
    target_flow: sign_in
    username: null
    email_address: alice@acme.example
    phone_number: null
    first_name: Alice
    last_name: Anderson
    password_enabled: false
    unsafe_metadata: {}
    public_metadata: {}
    created_session_id: null
    created_user_id: null
    abandon_at: 1714724000000
