type: object
description: |
  Public bootstrap configuration returned by `GET /v1/environment`. The
  SDK fetches this once at boot and uses it to render the right sign-in
  flow, branding, and locale set. No authentication required.
required:
  - object
  - id
  - auth_config
  - display_config
  - user_settings
  - organization_settings
  - commerce_settings
  - captcha
  - localization
  - oauth_providers
  - sms
  - appearance
  - paths
  - sessions
  - created_at
  - updated_at
additionalProperties: false
properties:
  object:
    type: string
    const: environment
  id:
    $ref: ./Id.yaml
  paths:
    type: object
    description: |
      Per-env path overrides for the Account Portal. Free-form in
      v0.1; the dashboard editor lands later.
    additionalProperties: true
  sessions:
    type: object
    description: |
      Per-env session settings the SDK needs at boot (refresh
      cadence, multi-session policy).
    additionalProperties: true
    properties:
      session_token_lifetime_seconds:
        type: integer
        minimum: 1
      multi_session:
        type: boolean
  created_at:
    $ref: ./Timestamp.yaml
  updated_at:
    $ref: ./Timestamp.yaml
  auth_config:
    type: object
    description: |
      Allowed authentication strategies and identifier requirements
      surfaced to the SDK at boot.
    additionalProperties: false
    properties:
      first_factors:
        type: array
        items:
          type: string
        description: |
          First-factor strategies the SDK should render. Server-narrowed
          per-env from `InstanceSettings.attribute_settings` and the
          enabled `OauthProvider` rows. Includes `phone_code` when
          `attributes.phone_number != "off"` and includes
          `oauth_<provider_key>` for each enabled `OauthProvider` row.
        examples: [["password", "email_code", "phone_code", "oauth_google", "reset_password_email_code", "ticket"]]
      second_factors:
        type: array
        items:
          type: string
        description: |
          Second-factor strategies the SDK should consider on
          `needs_second_factor`. Server-narrowed per-env from
          `InstanceSettings.multi_factor.*.enabled`. Includes `totp`,
          `backup_code`, `phone_code` when their respective
          `enabled: true`.
      identifier_requirements:
        type: object
        additionalProperties: false
        properties:
          email_address:
            type: string
            enum: [required, optional, off]
          phone_number:
            type: string
            enum: [required, optional, off]
            default: off
            description: |
              Mirrors `InstanceSettings.attribute_settings.phone_number`.
              `optional` means the SDK renders the phone field as
              optional at sign-up; `required` means sign-up cannot
              complete without a verified phone; `off` hides the field
              entirely.
          username:
            type: string
            enum: [required, optional, off]
            default: off
      sign_up_modes:
        type: array
        items:
          type: string
          enum: [public, restricted, waitlist]
  display_config:
    type: object
    description: Branding + post-auth redirect targets shown in the Account Portal.
    additionalProperties: false
    properties:
      application_name:
        type: string
      home_url:
        type: [string, "null"]
        format: uri
      logo_url:
        type: [string, "null"]
        format: uri
      favicon_url:
        type: [string, "null"]
        format: uri
      support_email:
        type: [string, "null"]
        format: email
      preferred_sign_in_strategy:
        type: string
        enum: [password, otp]
        default: password
      sign_in_url:
        type: string
        format: uri
      sign_up_url:
        type: string
        format: uri
      after_sign_in_url:
        type: string
        format: uri
      after_sign_up_url:
        type: string
        format: uri
      branded:
        type: boolean
        description: '`true` for the free tier (shows "powered by authn.sh").'
        default: false
      brand_color:
        type: [string, "null"]
        description: 'Hex color for the primary brand accent. `null` until the operator sets one.'
      theme:
        type: object
        description: Hex colors / radii. Free-form in v0.1.
        additionalProperties: true
  user_settings:
    type: object
    description: |
      Per-attribute write/verify flags mirrored from the dashboard.
      Flat in v0.1; richer per-attribute matrix lands in v0.5.
    additionalProperties: true
  organization_settings:
    type: object
    description: |
      Placeholder for organization-aware flows. Always `enabled: false`
      in v0.1.
    additionalProperties: true
    properties:
      enabled:
        type: boolean
        default: false
  commerce_settings:
    type: object
    description: |
      Placeholder for billing-aware flows. Always `enabled: false` in v0.1.
    additionalProperties: true
    properties:
      enabled:
        type: boolean
        default: false
  captcha:
    type: object
    description: |
      Per-environment CAPTCHA. `provider: none` disables it client-side.
      Fields are the public credentials the SDK needs to render the widget.
    additionalProperties: false
    properties:
      provider:
        type: string
        enum: [none, hcaptcha, turnstile]
        default: none
      widget_type:
        type: string
        enum: [smart, invisible, managed]
        default: smart
      public_key:
        type: [string, "null"]
  localization:
    type: object
    additionalProperties: false
    properties:
      default_locale:
        type: string
        examples: ["en-US"]
      supported_locales:
        type: array
        items:
          type: string
        examples: [["en-US", "pt-BR", "fr-FR"]]
  oauth_providers:
    type: array
    description: |
      Configured OAuth connections. Always `[]` in v0.1; populated when
      providers ship in v0.4.
    items:
      type: object
      additionalProperties: true
  appearance:
    type: object
    description: |
      Operator-configured visual customisation merged with
      consumer-supplied `appearance` props at render time. Same
      `Appearance` shape served by BAPI's
      `GET /v1/instance/appearance`, plus an `etag` so the SDK can
      cache and short-circuit re-renders.
    required: [etag]
    additionalProperties: false
    properties:
      etag:
        type: string
        description: |
          `sha256(canonical-JSON(<appearance-without-etag>))`. Stable
          across reads while the operator's config is unchanged.
        examples: ["sha256:9c1185a5c5e9fc54612808977ee8f548b2258d31"]
      variables:
        $ref: ./Appearance.yaml#/properties/variables
      elements:
        $ref: ./Appearance.yaml#/properties/elements
      layout:
        $ref: ./Appearance.yaml#/properties/layout
  sms:
    type: object
    description: |
      Per-environment outbound SMS configuration. The FAPI bootstrap
      strips every credential field — `auth_token` and `api_secret`
      are write-only on BAPI's `Environment` patch and never appear
      in any GET response (BAPI or FAPI). The FAPI surface only
      exposes `driver` + `from_number` so the SDK can render the
      correct UI affordances (e.g. show the phone-MFA toggle only
      when a driver is configured).

      `driver: null` means SMS sends are dropped with a no-op
      audit-log entry — useful in dev environments that don't have a
      Twilio / Vonage account wired up.
    additionalProperties: false
    required: [driver, from_number]
    properties:
      driver:
        type: [string, "null"]
        enum: [twilio, vonage, null]
        description: |
          Which carrier driver to use. `null` disables sends.
      from_number:
        type: [string, "null"]
        pattern: "^\\+[1-9][0-9]{1,14}$"
        maxLength: 16
        description: |
          E.164 number / short code messages are sent from. Falls
          through to per-template `from_number_override` when set.
      twilio:
        type: [object, "null"]
        additionalProperties: false
        description: |
          Twilio credentials. Returned on BAPI `GET /v1/instance` with
          `auth_token` redacted; the FAPI bootstrap omits this block
          entirely. `null` when `driver != "twilio"`.
        properties:
          account_sid:
            type: string
            maxLength: 64
            description: Twilio Account SID. Public — safe to read.
          auth_token:
            type: [string, "null"]
            writeOnly: true
            maxLength: 64
            description: |
              Twilio Auth Token. Write-only — accepted on
              `PATCH /v1/instance`, encrypted at rest, never returned
              by any GET. Send `null` to clear the stored token.
          messaging_service_sid:
            type: [string, "null"]
            maxLength: 64
            description: |
              Optional Twilio Messaging Service SID. When set, Twilio
              uses the service's pool of numbers instead of
              `from_number`.
      vonage:
        type: [object, "null"]
        additionalProperties: false
        description: |
          Vonage (Nexmo) credentials. Same write-only / read-stripping
          rules as `twilio`. `null` when `driver != "vonage"`.
        properties:
          api_key:
            type: string
            maxLength: 64
            description: Vonage API key. Public — safe to read.
          api_secret:
            type: [string, "null"]
            writeOnly: true
            maxLength: 64
            description: |
              Vonage API secret. Write-only — accepted on
              `PATCH /v1/instance`, encrypted at rest, never returned
              by any GET. Send `null` to clear the stored secret.
