name: lint

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint BAPI
        run: npm run lint:bapi

      - name: Lint FAPI
        run: npm run lint:fapi

      - name: Bundle BAPI
        run: npm run bundle:bapi

      - name: Bundle FAPI
        run: npm run bundle:fapi

      - name: BAPI stats
        run: npm run stats:bapi

      - name: FAPI stats
        run: npm run stats:fapi

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openapi-bundled
          path: dist/
          if-no-files-found: error
          retention-days: 30
