openapi: 3.1.0

info:
  title: authn.sh BAPI
  version: 0.1.0-pre
  summary: Backend API (server-to-server) for authn.sh.
  description: |
    The **BAPI** is the server-to-server admin surface. Authenticated
    with a workspace secret key (`sk_test_…` / `sk_live_…`), it lives
    at `https://api.authn.sh/v1` and handles every operation that
    requires elevated privileges — creating/banning users, minting
    invitations, managing organizations, configuring webhooks,
    rotating signing keys, etc.

    The browser-facing surface (FAPI) is documented separately in
    [`fapi.yaml`](./fapi.yaml). The two surfaces share the
    `components/` directory but have distinct paths, security
    schemes, and SDK consumers.

    SDKs that consume this surface include `@authn-sh/sdk-php` and
    the BAPI half of any future server-side SDK. They generate
    request/response types from `dist/bapi.bundled.json`.
  license:
    name: AGPL-3.0-only
    identifier: AGPL-3.0-only
  contact:
    name: authn.sh
    url: https://authn.sh
  termsOfService: https://authn.sh/terms

servers:
  - url: https://api.authn.sh/v1
    description: Production BAPI (workspace-scoped, server-to-server).

tags:
  - name: Users
    description: End-user identities.
  - name: Email Addresses
    description: User-owned email identifiers and their verification state.
  - name: Phone Numbers
    description: User-owned phone identifiers, their verification state, and MFA-reserve flags.
  - name: External Accounts
    description: Per-user links to social-IdP `OauthProvider` connections.
  - name: Sessions
    description: Live authenticated sessions across devices (admin view).
  - name: Organizations
    description: Organizations within an environment.
  - name: Org Memberships
    description: User ↔ organization joins.
  - name: Org Invitations
    description: Pending invitations to join an organization.
  - name: Org Domains
    description: Verified domains attached to an organization.
  - name: Roles
    description: Custom and system roles, scoped per environment.
  - name: Permissions
    description: System permissions catalog (and custom permissions, post-v0.2).
  - name: Invitations
    description: Application-level (non-organization) invitations.
  - name: Allowlist Identifiers
    description: Identifier patterns allowed to sign up under restricted mode.
  - name: Blocklist Identifiers
    description: Identifier patterns refused at sign-up.
  - name: Redirect URLs
    description: URLs allowed as post-flow redirect targets.
  - name: Instance
    description: Per-environment settings (`InstanceSetting`).
  - name: OAuth Providers
    description: Per-environment social-IdP configuration (`OauthProvider`).
  - name: Enterprise Connections
    description: Per-environment enterprise-IdP configuration (`EnterpriseConnection`).
  - name: SMS Templates
    description: Per-environment outbound SMS body customization (`SmsTemplate`).
  - name: Webhooks
    description: Webhook endpoints, deliveries, and the event envelope.

security:
  - bearer_secret_key: []

